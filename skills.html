  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@3.5.4/dist/locomotive-scroll.min.js"></script>
  <script>
    let target = 0;
    let current = 0;
    const ease = 0.075;

    const sliderwrap = document.querySelector(".sliderwrap");
    const markerw = document.querySelector(".markers-w");
    const activeslider = document.querySelector(".activeslider");

    let maxscroll = sliderwrap.offsetWidth - window.innerWidth;

    function lerp(start, end, factor) {
      return start + (end - start) * factor;
    }

    function updateActiveSlider(markerMove, markerMaxMove) {
      const partWidth = markerMaxMove / 11;
      let currentPart = Math.round((markerMove - 70) / partWidth) + 1;
      currentPart = Math.max(1, Math.min(12, currentPart));
      activeslider.textContent = `${currentPart}/12`;
    }

    function update() {
      current = lerp(current, target, ease);

      gsap.set(".sliderwrap", {
        x: -current,
      });

      const moveRatio = current / maxscroll;
      const markerMaxMove = window.innerWidth - markerw.offsetWidth - 170;
      const markerMove = 70 + moveRatio * markerMaxMove;

      gsap.set(".markers-w", {
        x: markerMove,
      });

      updateActiveSlider(markerMove, markerMaxMove);
      requestAnimationFrame(update);
    }

    window.addEventListener("resize", () => {
      maxscroll = sliderwrap.offsetWidth - window.innerWidth;
    });

    window.addEventListener("wheel", (e) => {
      target += e.deltaY;
      target = Math.max(0, Math.min(maxscroll, target));
    });

    window.addEventListener("load", () => {
      // Ensure images are loaded before starting
      maxscroll = sliderwrap.offsetWidth - window.innerWidth;
      update();
    });
             var content = document.querySelector(".warrap");
var curser = document.querySelector("#curser");
content.addEventListener("mousemove",function(dets){

// Animate page exit (when clicking internal links)
const links = document.querySelectorAll("a");

links.forEach(link => {
  link.addEventListener("click", function (e) {
    // Only animate for internal links
    if (link.hostname === window.location.hostname) {
      e.preventDefault();

      // Animate overlay to full screen
      gsap.to("#transition-overlay", {
        scaleY: 1,
        transformOrigin: "bottom", // from bottom to top
        duration: 0.7,
        ease: "power1.inOut",
        onComplete: () => {
          window.location = link.href;
        }
      });
    }
  });
});

// Animate page enter (when page loads)
window.addEventListener("load", () => {
  gsap.fromTo("#transition-overlay", 
    { scaleY: 1, transformOrigin: "top" }, // start fully covered from top
    { scaleY: 0, duration: 0.6, ease: "power2.inOut" } // reveal to bottom
  );
});

    
  </script>

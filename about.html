                 @font-face {

       .elem .overlay {

        }

 .nav{

        }

        }
        .nav a:first-child{

                #curser{

    position: fixed;
     z-index: 9999;

}
#curser h4{
    font-weight: 500;
}


 .nav a::after{
          content: '';
          position: absolute;
          left: 0;
          bottom: 0;
          height: 1.5px;
          width: 0;
          background-color: #dbdbdb;
          transition: all ease 0.3s;
         }
         .nav a:hover::after{
          width: 100%;
         }
          .nav a:first-child::after{
            background-color: #dcff7c;
        }
         .subhead a::after{
          content: '';
          position: absolute;
          left: 0;
          bottom: 0;
          height: 1.5px;
          width: 0;
          background-color: #969696;
          transition: all ease 0.3s;
         }
         .subhead a:hover::after{
          width: 100%;
         }
         a.aboutme:hover::after{
          width: 0%;

         }

     <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        var ele = document.querySelector(".elemcontainer");
        var img = document.querySelector("#imgf")
        ele.addEventListener("mouseenter",function () {
           img.style.display = "block"; 
        });
          ele.addEventListener("mouseleave",function () {
           img.style.display = "none"; 
        });
        var elems = document.querySelectorAll(".elem");
        elems.forEach(function(e){
            e.addEventListener("mouseenter", function(){
                var image = e.getAttribute("data-image");
                img.style.backgroundImage = `url(${image})`
            })
        })


                 var content = document.querySelector("#main");
var curser = document.querySelector("#curser");
content.addEventListener("mousemove",function(dets){
  gsap.to(curser,{
    x:dets.x,
    y:dets.y,
  })

})
// Animate page exit (when clicking internal links)
const links = document.querySelectorAll("a");

links.forEach(link => {
  link.addEventListener("click", function (e) {
    // Only animate for internal links
    if (link.hostname === window.location.hostname) {
      e.preventDefault();

      // Animate overlay to full screen
      gsap.to("#transition-overlay", {
        scaleY: 1,
        transformOrigin: "bottom", // from bottom to top
        duration: 0.7,
        ease: "power1.inOut",
        onComplete: () => {
          window.location = link.href;
        }
      });
    }
  });
});

// Animate page enter (when page loads)
window.addEventListener("load", () => {
  gsap.fromTo("#transition-overlay", 
    { scaleY: 1, transformOrigin: "top" }, // start fully covered from top
    { scaleY: 0, duration: 0.6, ease: "power2.inOut" } // reveal to bottom
  );
});

    </script>
</body>
